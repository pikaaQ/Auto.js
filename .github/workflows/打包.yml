name: Android CI

on:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup CMake 3.10.2
      uses: jwlawson/actions-setup-cmake@v1
      with:
        cmake-version: '3.10.2'

    - name: set up JDK 20
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Inject signing keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.AUTOJS_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > "$HOME/auto-js-t-pkcs12.jks"
          echo "Keystore injected successfully"
        else
          echo "No keystore secret configured — APK will be unsigned"
        fi

    - name: Build with Gradle
      env:
        autojspasswd: ${{ secrets.AUTOJS_KEYSTORE_PASS }}
        autojsalias: ${{ secrets.AUTOJS_KEYSTORE_ALIAS }}
      run: ./gradlew assembleRelease

    - name: Upload arm64 artifacts
      id: upload-arm64-apk
      uses: actions/upload-artifact@v4
      with:
        name: release-arm64-apk
        path: app/build/outputs/apk/release/*arm64-v8a*.apk
      continue-on-error: true

    - name: Upload armv7 artifacts
      id: upload-armv7-apk
      uses: actions/upload-artifact@v4
      with:
        name: release-armv7-apk
        path: app/build/outputs/apk/release/*-v7a*.apk
      continue-on-error: true
